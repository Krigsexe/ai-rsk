id: FORM_NO_LABEL
version: 2
severity: WARN
category: a11y
cwe:
  - "CWE-1059"
source:
  name: "WCAG 2.2 Success Criterion 1.3.1 — Info and Relationships + 4.1.2 Name, Role, Value"
  quote: "Information, structure, and relationships conveyed through presentation can be programmatically determined. All user interface components must have accessible names."
  note: "Input fields without labels are inaccessible to screen reader users — they hear 'edit text' with no context. WCAG 2.2 Level A. Also fails automated accessibility audits (Lighthouse, axe-core)."
  verified: true
  verified_date: "2026-03-16"
languages:
  - html
  - javascript
  - typescript
file_patterns:
  - "*.html"
  - "*.htm"
  - "*.jsx"
  - "*.tsx"
  - "*.vue"
  - "*.svelte"
patterns:
  # Match <input with type attribute (most common form inputs)
  - "<input\\s+type\\s*="
negation: true
negation_pattern: "<label|aria-label|aria-labelledby"
agnostic_negation: true
case_insensitive: true
message: "Form input detected without visible labeling mechanism. Screen reader users hear 'edit text' with no context for unlabeled inputs. WCAG 2.2 Level A requires every input to have an accessible name via <label>, aria-label, or aria-labelledby."
fix: |
  Associate labels with all form inputs:

    <!-- WRONG — no label: -->
    <input type="email" placeholder="Email">

    <!-- RIGHT — explicit label: -->
    <label for="email">Email</label>
    <input type="email" id="email">

    <!-- RIGHT — aria-label (when visual label is not possible): -->
    <input type="search" aria-label="Search articles">

    <!-- RIGHT — aria-labelledby: -->
    <h2 id="billing-title">Billing Address</h2>
    <input type="text" aria-labelledby="billing-title">

  NEVER rely on placeholder as the only label — it disappears when the user types.
