id: AI_OUTPUT_NO_LABEL
version: 1
severity: WARN
category: ai-act
cwe:
  - "CWE-451"
source:
  name: "EU AI Act Article 50(1-2) — Transparency obligations"
  quote: "Users must be informed clearly when they interact with AI. AI-generated content must be identifiable and labelled in a machine-readable and detectable way where technically feasible."
  note: "Enforceable August 2, 2026. Penalties up to 35M EUR or 7% global turnover. Applies to chatbots, content generators, and any system producing text/images/audio that could be mistaken for human-produced content."
  verified: true
  verified_date: "2026-03-15"
languages:
  - javascript
  - typescript
  - python
file_patterns:
  - "*.js"
  - "*.ts"
  - "*.jsx"
  - "*.tsx"
  - "*.mjs"
  - "*.cjs"
  - "*.py"
patterns:
  # OpenAI / Anthropic / Google AI SDK — response sent to user without labeling
  - "completion\\.choices\\[0\\]\\.message"
  - "response\\.content\\[0\\]\\.text"
  - "result\\.candidates\\[0\\]\\.content"
  # Generic LLM response patterns passed directly to user-facing output
  - "res\\.(send|json|render)\\s*\\(.*\\b(completion|aiResponse|llmResponse|chatResponse|generatedText|aiOutput|generated)"
negation: true
negation_pattern: "ai[_-]?generated|AI[_-]?Generated|generated[_-]?by[_-]?ai|Generated[_-]?by[_-]?AI|\\[AI\\]|\\[Bot\\]|ai[_-]?label|ai[_-]?disclosure|transparency[_-]?label|isAiGenerated|is_ai_generated|aiDisclosure|content[_-]?label"
case_insensitive: false
message: "AI-generated output sent to users without visible AI labeling. Under EU AI Act Article 50, users must be informed when they interact with AI and AI-generated content must be identifiable. This applies to chatbots, content generators, and any AI-assisted output."
fix: |
  Label all AI-generated content clearly:

    // Add disclosure to AI responses:
    const response = await openai.chat.completions.create({...});
    const aiContent = response.choices[0].message.content;
    res.json({
      content: aiContent,
      isAiGenerated: true,
      aiDisclosure: "This content was generated by AI."
    });

    // In the UI, display the label:
    {response.isAiGenerated && <span className="ai-label">AI-generated</span>}

  The label must be clear, visible, and accessible to the end user.
