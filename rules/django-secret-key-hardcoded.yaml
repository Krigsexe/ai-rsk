id: DJANGO_SECRET_KEY_HARDCODED
severity: BLOCK
cwe:
  - "CWE-798"
file_patterns:
  - "*.py"
patterns:
  - "SECRET_KEY\\s*=\\s*['\"]"
case_insensitive: false
message: "Django SECRET_KEY is hardcoded in source code. The SECRET_KEY is used for cryptographic signing (sessions, tokens, password reset). If exposed via git, attackers can forge sessions and bypass authentication."
fix: |
  Move SECRET_KEY to environment variable:
    import os
    SECRET_KEY = os.environ['DJANGO_SECRET_KEY']

  Or use django-environ:
    import environ
    env = environ.Env()
    SECRET_KEY = env('SECRET_KEY')

  Generate a new key: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
negation: false
exclude_paths:
  - "test"
  - "tests"
  - "fixtures"
  - "examples"
  - "docs"
category: "security"
metadata:
  name: "Django SECRET_KEY hardcoded in source"
  note: "Django docs: keep the secret key used in production secret. A leaked SECRET_KEY compromises all cryptographic operations."
